<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlexGPT - Fond d'écran animé</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .wallpaper-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Breathing animation on the logo */
        .logo-wrapper {
            position: relative;
            animation: breathing 4s ease-in-out infinite;
        }

        .logo-wrapper img {
            display: block;
            max-width: 90vw;
            max-height: 90vh;
            object-fit: contain;
        }

        /* Eye overlays - positioned on the demon's eyes */
        .eye {
            position: absolute;
            border-radius: 50%;
            animation: eyeGlow 3s ease-in-out infinite;
            mix-blend-mode: screen;
            pointer-events: none;
        }

        .eye-left {
            width: 3.5%;
            height: 6%;
            top: 22.5%;
            left: 39.5%;
        }

        .eye-right {
            width: 3.5%;
            height: 6%;
            top: 22.5%;
            right: 39.5%;
        }

        /* Eye glow: white -> red cycle */
        @keyframes eyeGlow {
            0%, 100% {
                background: radial-gradient(ellipse, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.6) 30%, rgba(255, 255, 255, 0.0) 70%);
                box-shadow:
                    0 0 15px 5px rgba(255, 255, 255, 0.8),
                    0 0 30px 10px rgba(255, 255, 255, 0.4),
                    0 0 60px 20px rgba(255, 255, 255, 0.2);
            }
            50% {
                background: radial-gradient(ellipse, rgba(255, 0, 0, 1) 0%, rgba(255, 30, 0, 0.8) 30%, rgba(200, 0, 0, 0.0) 70%);
                box-shadow:
                    0 0 15px 5px rgba(255, 0, 0, 0.9),
                    0 0 30px 10px rgba(255, 0, 0, 0.5),
                    0 0 60px 20px rgba(255, 0, 0, 0.3),
                    0 0 100px 40px rgba(200, 0, 0, 0.15);
            }
        }

        /* Breathing: subtle scale effect */
        @keyframes breathing {
            0%, 100% {
                transform: scale(1);
                filter: brightness(1);
            }
            50% {
                transform: scale(1.03);
                filter: brightness(1.08);
            }
        }

        /* Ambient fire glow behind the logo */
        .fire-glow {
            position: absolute;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            background: radial-gradient(ellipse, rgba(255, 60, 0, 0.15) 0%, rgba(200, 30, 0, 0.05) 40%, transparent 70%);
            animation: fireAmbient 5s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes fireAmbient {
            0%, 100% {
                opacity: 0.5;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        /* Particle embers */
        .ember {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #ff4400;
            border-radius: 50%;
            opacity: 0;
            animation: emberFloat linear infinite;
            pointer-events: none;
        }

        @keyframes emberFloat {
            0% {
                opacity: 0;
                transform: translateY(0) scale(1);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                opacity: 0;
                transform: translateY(-200px) scale(0);
            }
        }
    </style>
</head>
<body>
    <div class="wallpaper-container">
        <div class="fire-glow"></div>
        <div class="logo-wrapper">
            <!-- Remplacer demon-logo.png par le chemin de votre image -->
            <img src="demon-logo.png" alt="AlexGPT" id="logo">
            <div class="eye eye-left"></div>
            <div class="eye eye-right"></div>
        </div>
    </div>

    <script>
        // Create floating ember particles
        const container = document.querySelector('.wallpaper-container');
        const emberCount = 25;

        for (let i = 0; i < emberCount; i++) {
            const ember = document.createElement('div');
            ember.classList.add('ember');
            ember.style.left = Math.random() * 100 + '%';
            ember.style.bottom = Math.random() * 30 + '%';
            ember.style.animationDuration = (3 + Math.random() * 4) + 's';
            ember.style.animationDelay = Math.random() * 5 + 's';
            ember.style.width = (2 + Math.random() * 3) + 'px';
            ember.style.height = ember.style.width;
            ember.style.background = Math.random() > 0.5 ? '#ff4400' : '#ff6600';
            container.appendChild(ember);
        }

        // Interactive: adjust eye positions with URL params
        // Usage: index.html?elx=39.5&ely=22.5&erx=57&ery=22.5&ew=3.5&eh=6
        const params = new URLSearchParams(window.location.search);
        const eyeLeft = document.querySelector('.eye-left');
        const eyeRight = document.querySelector('.eye-right');

        if (params.has('elx')) eyeLeft.style.left = params.get('elx') + '%';
        if (params.has('ely')) eyeLeft.style.top = params.get('ely') + '%';
        if (params.has('erx')) eyeRight.style.right = (100 - parseFloat(params.get('erx'))) + '%';
        if (params.has('ery')) eyeRight.style.top = params.get('ery') + '%';
        if (params.has('ew')) {
            eyeLeft.style.width = params.get('ew') + '%';
            eyeRight.style.width = params.get('ew') + '%';
        }
        if (params.has('eh')) {
            eyeLeft.style.height = params.get('eh') + '%';
            eyeRight.style.height = params.get('eh') + '%';
        }
    </script>
</body>
</html>
