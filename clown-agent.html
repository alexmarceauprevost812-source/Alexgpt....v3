<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlexGPT - Agent Clown AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Nunito', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========== HEADER ========== */
        .header {
            background: linear-gradient(135deg, #1a0a2e 0%, #0d0d2b 50%, #1a0a2e 100%);
            border-bottom: 2px solid #6c3ce0;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(108, 60, 224, 0.3);
        }

        .header-avatar {
            position: relative;
            width: 50px;
            height: 50px;
            flex-shrink: 0;
        }

        .header-avatar img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #6c3ce0;
            animation: avatarPulse 3s ease-in-out infinite;
        }

        .header-avatar .status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #22c55e;
            border-radius: 50%;
            border: 2px solid #1a0a2e;
            animation: statusBlink 2s ease-in-out infinite;
        }

        @keyframes avatarPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(108, 60, 224, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(108, 60, 224, 0); }
        }

        @keyframes statusBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-info h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 1.2rem;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rainbowText 4s ease-in-out infinite;
        }

        @keyframes rainbowText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header-info p {
            font-size: 0.75rem;
            color: #a78bfa;
        }

        /* ========== CHAT AREA ========== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background:
                radial-gradient(circle at 20% 50%, rgba(108, 60, 224, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 107, 107, 0.05) 0%, transparent 50%),
                #0a0a0a;
        }

        /* Message bubbles */
        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: messageIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .message.bot {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid #6c3ce0;
        }

        .msg-avatar.user-avatar {
            border-color: #feca57;
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            position: relative;
        }

        .message.bot .msg-bubble {
            background: linear-gradient(135deg, #1e1e3f, #2a1a4e);
            border: 1px solid rgba(108, 60, 224, 0.3);
            border-bottom-left-radius: 4px;
        }

        .message.user .msg-bubble {
            background: linear-gradient(135deg, #6c3ce0, #8b5cf6);
            border-bottom-right-radius: 4px;
        }

        .msg-bubble .joke-tag {
            display: inline-block;
            background: rgba(254, 202, 87, 0.2);
            color: #feca57;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 8px;
            font-weight: 700;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 10px;
            align-self: flex-start;
            max-width: 85%;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 14px 18px;
            background: linear-gradient(135deg, #1e1e3f, #2a1a4e);
            border: 1px solid rgba(108, 60, 224, 0.3);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #6c3ce0;
            border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        /* ========== INPUT AREA ========== */
        .input-area {
            padding: 15px 20px;
            background: linear-gradient(135deg, #1a0a2e, #0d0d2b);
            border-top: 1px solid rgba(108, 60, 224, 0.3);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 25px;
            border: 1px solid rgba(108, 60, 224, 0.4);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-area input:focus {
            border-color: #6c3ce0;
            box-shadow: 0 0 15px rgba(108, 60, 224, 0.3);
        }

        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #6c3ce0, #8b5cf6);
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(108, 60, 224, 0.5);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* ========== CONFETTI ========== */
        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            pointer-events: none;
            z-index: 1000;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0% { opacity: 1; transform: translateY(0) rotate(0deg); }
            100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
        }

        /* ========== SMOKE from avatar ========== */
        .smoke-container {
            position: absolute;
            top: -10px;
            right: -5px;
            width: 30px;
            height: 40px;
            overflow: visible;
            pointer-events: none;
        }

        .smoke-puff {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(200, 200, 200, 0.3);
            border-radius: 50%;
            animation: smokeRise 3s ease-out infinite;
        }

        .smoke-puff:nth-child(2) { animation-delay: 1s; left: 5px; }
        .smoke-puff:nth-child(3) { animation-delay: 2s; left: 10px; }

        @keyframes smokeRise {
            0% {
                opacity: 0.4;
                transform: translateY(0) scale(0.5);
            }
            50% {
                opacity: 0.2;
            }
            100% {
                opacity: 0;
                transform: translateY(-30px) translateX(10px) scale(2);
            }
        }

        /* ========== SCROLLBAR ========== */
        .chat-area::-webkit-scrollbar {
            width: 6px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(108, 60, 224, 0.3);
            border-radius: 3px;
        }

        /* ========== FLOATING EMOJI ========== */
        .float-emoji {
            position: fixed;
            font-size: 1.5rem;
            pointer-events: none;
            z-index: 999;
            animation: emojiFloat 3s ease-out forwards;
        }

        @keyframes emojiFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-150px) scale(0.5); }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="header-avatar">
            <img src="clown-avatar.png" alt="Krusty AI" id="mainAvatar">
            <div class="status-dot"></div>
            <div class="smoke-container">
                <div class="smoke-puff"></div>
                <div class="smoke-puff"></div>
                <div class="smoke-puff"></div>
            </div>
        </div>
        <div class="header-info">
            <h1>KrustyGPT - Agent AI</h1>
            <p>En ligne - Pret a faire rire et aider!</p>
        </div>
    </div>

    <!-- CHAT -->
    <div class="chat-area" id="chatArea">
        <!-- Welcome message -->
        <div class="message bot">
            <img src="clown-avatar.png" alt="Krusty" class="msg-avatar">
            <div class="msg-bubble">
                Hé hé hé! Bienvenue dans mon show! Je suis <strong>KrustyGPT</strong>, ton agent AI le plus drole du game!
                Pose-moi n'importe quelle question, je te reponds avec style et humour... mais toujours productif!
                <span class="joke-tag">HONK HONK!</span>
            </div>
        </div>
    </div>

    <!-- INPUT -->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ecris quelque chose de drole... ou pas!" autocomplete="off">
        <button class="send-btn" id="sendBtn">&#9658;</button>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // Krusty's funny responses database
        const krustyResponses = {
            greetings: [
                "Hé hé hé! Salut mon ami! Tu viens pour le show ou pour les conseils gratuits? Les deux sont au meme prix: GRATUIT! HONK!",
                "Bienvenue bienvenue! Installe-toi, prends du popcorn... ah non attends, c'est un chat, pas un cinema. Mais bon, ca va etre drole pareil!",
                "Oh un nouveau spectateur! Attention, mes blagues sont tellement bonnes que ton ecran pourrait exploser de rire!"
            ],
            help: [
                "Tu as besoin d'aide? Pas de panique! KrustyGPT est la! Je suis comme un clown dans un hopital... sauf que je suis VRAIMENT utile! Dis-moi tout!",
                "Aider les gens c'est mon metier! Enfin... faire rire c'est mon VRAI metier, mais aider c'est le bonus! Qu'est-ce qu'il te faut?",
                "J'arrive tel un super-heros... avec un nez rouge et des grandes chaussures! Comment puis-je t'aider aujourd'hui?"
            ],
            code: [
                "Du code? Ah oui, j'adore coder! Tu sais quelle est la difference entre un bug et une feature? Le marketing! Mais serieusement, montre-moi ton probleme.",
                "Coder c'est comme jongler... sauf qu'au lieu de balles, ce sont des bugs qui te retombent dessus! Allez, qu'est-ce qu'on construit?",
                "console.log('KrustyGPT au rapport!') Pret a debugger ta vie... euh, ton code!"
            ],
            jokes: [
                "Pourquoi les developpeurs detestent la nature? Parce qu'elle a trop de bugs! HONK HONK!",
                "Un DBA entre dans un bar... et il casse les deux tables! Ba dum tss!",
                "Combien de programmeurs faut-il pour changer une ampoule? Aucun, c'est un probleme hardware! HO HO HO!",
                "Pourquoi les programmeurs confondent Halloween et Noel? Parce que 31 OCT = 25 DEC! HAHAHAHA!",
                "J'ai essaye de faire une blague sur Java... mais elle prenait trop de memoire! HONK!"
            ],
            default: [
                "Hmmm interesting! Laisse KrustyGPT reflechir... *fait tourner son noeud papillon*... OK j'ai la reponse! En fait non, mais c'etait drole non?",
                "Bonne question! Tu sais, dans le monde du spectacle on dit: 'Si tu sais pas, fais une blague.' Mais moi je sais ET je fais des blagues!",
                "OH OH OH! Ca c'est une question qui vaut de l'or! Ou au moins un ticket de spectacle. Laisse-moi te donner une reponse productive ET amusante!",
                "Mon nez rouge clignote, ca veut dire que j'ai une reponse! Ou que la batterie est faible. Dans les deux cas, voici ce que j'en pense!"
            ],
            goodbye: [
                "Tu t'en vas deja? Le show est pas fini! Bon OK, a la prochaine! N'oublie pas: un rire par jour eloigne le medecin!",
                "Bye bye! Reviens quand tu veux, mon nez rouge t'attend! HONK HONK!",
                "A bientot l'ami! Et souviens-toi: la vie est un cirque, autant en etre le clown! HE HE HE!"
            ]
        };

        function getCategory(text) {
            const lower = text.toLowerCase();
            if (/salut|bonjour|hey|allo|hello|yo |coucou/.test(lower)) return 'greetings';
            if (/aide|help|comment|probleme|besoin/.test(lower)) return 'help';
            if (/code|bug|erreur|fonction|variable|javascript|python|html|css|program/.test(lower)) return 'code';
            if (/blague|joke|rire|drole|funny|humour|marrant/.test(lower)) return 'jokes';
            if (/bye|salut$|ciao|bonsoir|bonne nuit|au revoir|a\+/.test(lower)) return 'goodbye';
            return 'default';
        }

        function getRandomResponse(category) {
            const responses = krustyResponses[category];
            return responses[Math.floor(Math.random() * responses.length)];
        }

        function addMessage(text, isUser) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'bot'}`;

            const avatar = document.createElement('img');
            avatar.src = isUser ? '' : 'clown-avatar.png';
            avatar.alt = isUser ? 'You' : 'Krusty';
            avatar.className = `msg-avatar ${isUser ? 'user-avatar' : ''}`;
            if (isUser) {
                avatar.style.background = 'linear-gradient(135deg, #feca57, #ff9ff3)';
                avatar.style.display = 'flex';
                avatar.style.alignItems = 'center';
                avatar.style.justifyContent = 'center';
                avatar.style.fontSize = '1.2rem';
            }

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.innerHTML = text;

            if (!isUser) {
                const tag = document.createElement('span');
                tag.className = 'joke-tag';
                const tags = ['HONK!', 'HE HE!', 'BA DUM TSS!', 'WOMP WOMP!', '*nez rouge*', 'TADAAA!'];
                tag.textContent = tags[Math.floor(Math.random() * tags.length)];
                bubble.appendChild(document.createElement('br'));
                bubble.appendChild(tag);
            }

            msg.appendChild(avatar);
            msg.appendChild(bubble);
            chatArea.appendChild(msg);
            chatArea.scrollTop = chatArea.scrollHeight;

            // Confetti on bot messages
            if (!isUser) {
                spawnConfetti();
                spawnFloatingEmoji();
            }
        }

        function showTyping() {
            const typing = document.createElement('div');
            typing.className = 'typing-indicator';
            typing.id = 'typingIndicator';

            const avatar = document.createElement('img');
            avatar.src = 'clown-avatar.png';
            avatar.alt = 'Krusty';
            avatar.className = 'msg-avatar';

            const dots = document.createElement('div');
            dots.className = 'typing-dots';
            dots.innerHTML = '<span></span><span></span><span></span>';

            typing.appendChild(avatar);
            typing.appendChild(dots);
            chatArea.appendChild(typing);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function spawnConfetti() {
            for (let i = 0; i < 8; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-10px';
                confetti.style.background = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#6c3ce0', '#22c55e'][Math.floor(Math.random() * 6)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                confetti.style.width = (5 + Math.random() * 8) + 'px';
                confetti.style.height = confetti.style.width;
                confetti.style.animationDuration = (2 + Math.random() * 3) + 's';
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        function spawnFloatingEmoji() {
            const emojis = ['🤡', '😂', '🎪', '🎭', '🎉', '🃏', '👃', '🎈'];
            const emoji = document.createElement('div');
            emoji.className = 'float-emoji';
            emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = (20 + Math.random() * 60) + 'vw';
            emoji.style.bottom = '80px';
            document.body.appendChild(emoji);
            setTimeout(() => emoji.remove(), 3000);
        }

        function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            userInput.value = '';

            showTyping();

            // Simulate response delay (like a real comedian timing)
            const delay = 1000 + Math.random() * 1500;
            setTimeout(() => {
                removeTyping();
                const category = getCategory(text);
                const response = getRandomResponse(category);
                addMessage(response, false);
            }, delay);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        // Easter egg: click the header avatar for a surprise
        document.getElementById('mainAvatar').addEventListener('click', () => {
            spawnConfetti();
            spawnConfetti();
            spawnFloatingEmoji();
            spawnFloatingEmoji();
            spawnFloatingEmoji();

            const surprises = [
                "HO HO HO! Tu as trouve l'easter egg! Tu merites un prix: 🏆 ...un trophee virtuel, c'est tout ce que j'ai!",
                "SURPRISE! *fait sortir un lapin d'un chapeau* ...ok c'etait juste un bug, mais c'etait magique non?",
                "HONK HONK HONK! Tu as clique sur mon nez! Enfin... mon avatar. Meme chose!"
            ];

            addMessage(surprises[Math.floor(Math.random() * surprises.length)], false);
        });

        // Auto-scroll focus
        userInput.focus();
    </script>
</body>
</html>
