<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AlexGPT Social</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#0a0a0a;--bg2:#111113;--card:#161618;--card2:#1c1c1f;
      --text:#f0f0f0;--sub:#8a8a8e;--accent:#ff6a00;--accent2:#ff9d3d;
      --accent-glow:rgba(255,106,0,.25);--border:#2a2a2e;--input-bg:#131315;
      --topbar:#111113;--danger:#ff4757;--success:#2ed573;--bubble:#1877f2;
      --radius:14px;--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
    }
    body.light{
      --bg:#f5f5f7;--bg2:#eeeef0;--card:#ffffff;--card2:#f0f0f2;
      --text:#1a1a1d;--sub:#6e6e73;--accent:#0071e3;--accent2:#409cff;
      --accent-glow:rgba(0,113,227,.15);--border:#d2d2d7;--input-bg:#ffffff;--topbar:#f5f5f7;
    }
    html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);}
    body{transition:background .35s,color .35s;}
    .hidden{display:none !important;}
    button{font-family:var(--font);}
    input,textarea,select{font-family:var(--font);}

    #splash{position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    #matrixCanvas{position:absolute;inset:0;width:100%;height:100%;opacity:.2;z-index:1;}
    #fireCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:2;opacity:.7;}
    .splash-glow{position:absolute;width:70vmin;height:70vmin;border-radius:50%;background:radial-gradient(circle,rgba(255,80,0,.5),rgba(255,40,0,.1),transparent 65%);filter:blur(30px);animation:hPulse 2s ease-in-out infinite;z-index:3;}
    @keyframes hPulse{0%,100%{transform:scale(.85);opacity:.6;}50%{transform:scale(1.15);opacity:1;}}
    .fire-ring{position:absolute;width:55vmin;height:55vmin;border-radius:50%;border:3px solid rgba(255,100,0,.4);box-shadow:0 0 40px rgba(255,80,0,.3),0 0 80px rgba(255,50,0,.15),inset 0 0 40px rgba(255,80,0,.15);animation:fireRingSpin 8s linear infinite;z-index:3;}
    @keyframes fireRingSpin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
    .splash-inner{position:relative;z-index:10;text-align:center;padding:20px;}
    .splash-logo-fly{width:min(65vw,480px);margin:0 auto;animation:logoFlyIn 5s cubic-bezier(.22,.61,.36,1) forwards;transform:translateY(-120vh) scale(.3) rotate(-15deg);opacity:0;filter:drop-shadow(0 0 20px rgba(255,106,0,1)) drop-shadow(0 0 50px rgba(255,60,0,.8)) drop-shadow(0 0 100px rgba(255,30,0,.4));}
    .logo-img{width:100%;display:block;user-select:none;pointer-events:none;animation:logoHover 2.5s ease-in-out infinite;animation-delay:2.5s;}
    @keyframes logoFlyIn{0%{transform:translateY(-120vh) scale(.3) rotate(-15deg);opacity:0;}15%{opacity:1;}40%{transform:translateY(10px) scale(1.15) rotate(3deg);opacity:1;}55%{transform:translateY(-15px) scale(.95) rotate(-2deg);}70%{transform:translateY(5px) scale(1.05) rotate(1deg);}85%{transform:translateY(-3px) scale(.98) rotate(0deg);}100%{transform:translateY(0) scale(1) rotate(0deg);opacity:1;}}
    @keyframes logoHover{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
    .splash-title-text{margin-top:14px;font-size:clamp(24px,5vw,44px);font-weight:900;color:#fff;letter-spacing:4px;text-shadow:0 0 20px rgba(255,106,0,1),0 0 40px rgba(255,60,0,.6);animation:titleFade 5s ease forwards;opacity:0;}
    @keyframes titleFade{0%,50%{opacity:0;transform:translateY(20px);}70%{opacity:1;transform:translateY(0);}}
    .splash-sub{margin-top:6px;color:#ffd7a8;font-size:clamp(12px,2vw,16px);font-weight:300;animation:titleFade 5s ease forwards;opacity:0;animation-delay:.3s;}
    .ember-container{position:absolute;inset:0;z-index:4;pointer-events:none;overflow:hidden;}
    .ember{position:absolute;border-radius:50%;animation:emberFloat linear forwards;pointer-events:none;}
    @keyframes emberFloat{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-100vh) scale(0);}}
    .load-bar{width:min(70vw,300px);height:8px;margin:22px auto 0;background:rgba(255,255,255,.08);border:1px solid rgba(255,106,0,.3);border-radius:99px;overflow:hidden;}
    .load-fill{height:100%;width:0;background:linear-gradient(90deg,#ff5500,#ff9f1a,#ffd76a);box-shadow:0 0 14px rgba(255,106,0,.7);animation:fillBar 4.5s linear forwards;}
    @keyframes fillBar{from{width:0%;}to{width:100%;}}

    .auth-wrap{width:100%;height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(circle at center,rgba(255,106,0,.1),transparent 40%),linear-gradient(180deg,#050505,#0f0f0f);}
    .auth-card{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:22px;padding:30px;box-shadow:0 0 40px rgba(0,0,0,.4);}
    .auth-card h1{text-align:center;font-size:30px;font-weight:900;margin-bottom:6px;letter-spacing:1px;}
    .auth-card .tagline{text-align:center;color:var(--sub);margin-bottom:22px;font-size:14px;}
    .auth-tabs{display:flex;gap:8px;margin-bottom:20px;}
    .auth-tab{flex:1;border:1px solid var(--border);background:var(--card2);color:var(--text);padding:12px;border-radius:var(--radius);cursor:pointer;font-weight:700;font-size:14px;transition:.25s;text-align:center;}
    .auth-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    body:not(.light) .auth-tab.active{color:#000;}
    .field{margin-bottom:14px;}
    .field label{display:block;margin-bottom:6px;font-size:13px;font-weight:600;color:var(--sub);}
    .field input,.field textarea,.field select{width:100%;padding:13px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--input-bg);color:var(--text);outline:none;font-size:14px;transition:.2s;}
    .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
    .auth-error{color:var(--danger);font-size:13px;margin-bottom:10px;display:none;text-align:center;}

    .auth-divider{display:flex;align-items:center;gap:14px;margin:20px 0;}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .auth-divider span{color:var(--sub);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;}
    .btn-guest{width:100%;border:2px dashed var(--accent);background:transparent;color:var(--accent);border-radius:var(--radius);padding:14px 18px;font-weight:800;font-size:15px;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:10px;position:relative;overflow:hidden;}
    .btn-guest:hover{background:var(--accent);color:#fff;border-style:solid;transform:translateY(-2px);box-shadow:0 6px 25px rgba(255,106,0,.35);}
    body:not(.light) .btn-guest:hover{color:#000;}
    .btn-guest .guest-icon{font-size:20px;}
    .btn-guest .guest-sparkle{position:absolute;inset:0;pointer-events:none;background:linear-gradient(135deg,transparent 40%,rgba(255,106,0,.08) 50%,transparent 60%);background-size:250% 250%;animation:guestShine 3s ease-in-out infinite;}
    @keyframes guestShine{0%{background-position:200% 0;}50%{background-position:-50% 100%;}100%{background-position:200% 0;}}

    .guest-banner{background:linear-gradient(90deg,rgba(255,106,0,.15),rgba(255,160,50,.08));border:1px solid rgba(255,106,0,.3);border-radius:12px;padding:12px 18px;margin:0 auto 16px;max-width:720px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .guest-banner-text{font-size:13px;font-weight:600;color:var(--accent);}
    .guest-banner-text span{font-weight:400;color:var(--sub);margin-left:4px;}
    .btn-upgrade{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-weight:700;font-size:12px;cursor:pointer;transition:.25s;white-space:nowrap;}
    body:not(.light) .btn-upgrade{color:#000;}
    .btn-upgrade:hover{background:var(--accent2);transform:translateY(-1px);}

    .btn{border:none;border-radius:var(--radius);padding:12px 18px;font-weight:700;cursor:pointer;transition:.25s;font-size:14px;}
    .btn-primary{background:var(--accent);color:#fff;width:100%;}
    body:not(.light) .btn-primary{color:#000;}
    .btn-primary:hover{background:var(--accent2);transform:translateY(-1px);}
    .btn-primary:active{transform:scale(.97);}
    .btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border);}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
    .btn-danger{background:var(--danger);color:#fff;}
    .btn-success{background:var(--success);color:#fff;}
    .btn-sm{padding:8px 14px;font-size:12px;border-radius:10px;}

    .app-shell{display:none;width:100%;height:100dvh;}
    .sidebar{width:240px;min-width:240px;background:var(--bg2);border-right:1px solid var(--border);padding:18px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;transition:width .3s,min-width .3s,padding .3s;}
    .sidebar.collapsed{width:0;min-width:0;padding:0;overflow:hidden;border:none;}
    .sidebar-logo{text-align:center;margin-bottom:18px;}
    .nav-btn{width:100%;background:transparent;color:var(--text);border:none;border-radius:12px;padding:12px 14px;text-align:left;cursor:pointer;font-size:14px;font-weight:500;transition:.2s;display:flex;align-items:center;gap:10px;}
    .nav-btn:hover{background:var(--card2);color:var(--accent);transform:translateX(3px);}
    .nav-btn.active{background:var(--accent);color:#fff;font-weight:700;}
    body:not(.light) .nav-btn.active{color:#000;}
    .nav-btn .icon{font-size:18px;width:24px;text-align:center;}
    .nav-sep{height:1px;background:var(--border);margin:8px 0;}
    .sidebar-user{margin-top:auto;padding:12px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);display:flex;align-items:center;gap:10px;}
    .sidebar-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#000;flex-shrink:0;overflow:hidden;}
    .sidebar-avatar img{width:100%;height:100%;object-fit:cover;}
    .sidebar-name{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .sidebar-email{font-size:11px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    .main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg);position:relative;}
    .topbar{height:60px;background:var(--topbar);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 18px;flex-shrink:0;}
    .topbar-toggle{background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px;}
    .topbar h1{color:var(--accent);font-size:18px;font-weight:800;white-space:nowrap;}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
    .content{flex:1;overflow-y:auto;padding:20px;scroll-behavior:smooth;}
    .input-bar{display:flex;gap:8px;padding:12px 16px;background:var(--topbar);border-top:1px solid var(--border);}
    .input-bar input{flex:1;padding:12px 14px;border-radius:var(--radius);background:var(--input-bg);color:var(--text);border:1px solid var(--border);outline:none;font-size:14px;}
    .input-bar input:focus{border-color:var(--accent);}

    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;max-width:720px;margin:0 auto 18px;}
    .card-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
    .card-avatar{width:44px;height:44px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#000;flex-shrink:0;overflow:hidden;}
    .card-name{font-weight:700;font-size:15px;}
    .card-time{font-size:12px;color:var(--sub);}
    .card-body{font-size:14px;line-height:1.6;margin-bottom:14px;}
    .card-actions{display:flex;gap:6px;flex-wrap:wrap;}
    .card-actions .btn{display:flex;align-items:center;gap:6px;}

    .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:14px;}
    .stat-box{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;}
    .stat-box h3{color:var(--accent);font-size:26px;font-weight:800;margin-bottom:4px;}
    .stat-box p{color:var(--sub);font-size:12px;font-weight:500;}

    .profile-header{display:flex;flex-wrap:wrap;gap:20px;align-items:center;margin-bottom:22px;}
    .avatar-big{width:120px;height:120px;border-radius:50%;background:var(--card2);border:3px solid var(--accent);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:var(--sub);flex-shrink:0;}
    .avatar-big img{width:100%;height:100%;object-fit:cover;}

    .setting-row{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:14px;background:var(--card2);border-radius:12px;margin-top:10px;border:1px solid var(--border);}
    .setting-label{font-weight:600;font-size:14px;}
    .setting-desc{font-size:12px;color:var(--sub);margin-top:2px;}
    .switch{position:relative;width:52px;height:28px;display:inline-block;flex-shrink:0;}
    .switch input{opacity:0;width:0;height:0;}
    .slider{position:absolute;inset:0;background:#555;border-radius:99px;transition:.25s;cursor:pointer;}
    .slider:before{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;border-radius:50%;background:#fff;transition:.25s;}
    .switch input:checked+.slider{background:var(--accent);}
    .switch input:checked+.slider:before{transform:translateX(24px);}

    .chat-wrap{display:flex;flex-direction:column;gap:10px;max-width:720px;margin:0 auto;}
    .msg{max-width:78%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;}
    .msg.bot{align-self:flex-start;background:var(--card2);border:1px solid var(--border);}
    .msg.user{align-self:flex-end;background:var(--accent);color:#fff;font-weight:600;}
    body:not(.light) .msg.user{color:#000;}
    .emoji-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding:10px;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);max-width:720px;margin-left:auto;margin-right:auto;}
    .emoji-btn{font-size:22px;padding:6px 10px;border:none;border-radius:10px;cursor:pointer;background:transparent;transition:.2s;}
    .emoji-btn:hover{transform:scale(1.2);background:rgba(255,255,255,.06);}

    .notif-item{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
    .notif-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;}
    .notif-dot.read{background:var(--sub);}
    .user-card{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:16px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
    .user-card h3{color:var(--accent);font-size:15px;}
    .user-card p{color:var(--sub);font-size:12px;margin-top:3px;}

    
    .privacy-shield{text-align:center;padding:30px 20px;}
    .privacy-logo{width:min(70vw,360px);margin:0 auto 20px;filter:drop-shadow(0 0 25px rgba(255,80,0,.9)) drop-shadow(0 0 60px rgba(255,40,0,.5));animation:privacyPulse 3s ease-in-out infinite;}
    .privacy-logo img{width:100%;display:block;}
    @keyframes privacyPulse{0%,100%{filter:drop-shadow(0 0 25px rgba(255,80,0,.9)) drop-shadow(0 0 60px rgba(255,40,0,.5));transform:scale(1);}50%{filter:drop-shadow(0 0 35px rgba(255,100,0,1)) drop-shadow(0 0 80px rgba(255,60,0,.7));transform:scale(1.03);}}
    .privacy-lock{font-size:60px;margin-bottom:14px;animation:lockBounce 2s ease-in-out infinite;}
    @keyframes lockBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
    .privacy-title{font-size:clamp(22px,4vw,32px);font-weight:900;color:var(--accent);margin-bottom:8px;letter-spacing:1px;}
    .privacy-msg{font-size:15px;color:var(--sub);line-height:1.6;max-width:400px;margin:0 auto 20px;}
    .privacy-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,106,0,.12);border:1px solid rgba(255,106,0,.3);border-radius:50px;padding:10px 22px;font-weight:700;font-size:13px;color:var(--accent);}
    .privacy-stats{display:flex;gap:14px;justify-content:center;margin-top:20px;flex-wrap:wrap;}
    .privacy-stat{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 20px;text-align:center;}
    .privacy-stat h4{color:var(--accent);font-size:18px;font-weight:800;}
    .privacy-stat p{color:var(--sub);font-size:11px;margin-top:2px;}

    
    .theme-transition{position:fixed;inset:0;z-index:99999;display:none;align-items:center;justify-content:center;opacity:0;}
    .theme-transition.active{display:flex;animation:ttFadeInOut 3s ease forwards;}
    @keyframes ttFadeInOut{0%{opacity:0;}8%{opacity:1;}80%{opacity:1;}100%{opacity:0;}}
    .tt-bg{position:absolute;inset:0;background:radial-gradient(circle at center,rgba(255,106,0,.2),#000 70%);z-index:1;}
    .tt-content{position:relative;z-index:2;text-align:center;animation:ttZoomIn 3s ease forwards;}
    @keyframes ttZoomIn{0%{transform:scale(.5) rotate(-10deg);opacity:0;}15%{transform:scale(1.1) rotate(2deg);opacity:1;}25%{transform:scale(1) rotate(0deg);}75%{transform:scale(1) rotate(0deg);}100%{transform:scale(1.3);opacity:0;}}
    .tt-avatar{width:min(55vw,280px);height:min(55vw,280px);border-radius:50%;margin:0 auto 20px;overflow:hidden;border:4px solid var(--accent);box-shadow:0 0 40px rgba(255,106,0,.6),0 0 80px rgba(255,60,0,.3);animation:ttAvatarGlow 1.5s ease-in-out infinite;}
    .tt-avatar img{width:100%;height:100%;object-fit:cover;}
    @keyframes ttAvatarGlow{0%,100%{box-shadow:0 0 40px rgba(255,106,0,.6),0 0 80px rgba(255,60,0,.3);}50%{box-shadow:0 0 60px rgba(255,106,0,.9),0 0 120px rgba(255,60,0,.5);}}
    .tt-text{font-size:clamp(24px,5vw,42px);font-weight:900;color:#fff;letter-spacing:2px;text-shadow:0 0 20px rgba(255,106,0,.9),0 4px 15px rgba(0,0,0,.5);animation:ttTextSlide 3s ease forwards;opacity:0;}
    @keyframes ttTextSlide{0%,15%{opacity:0;transform:translateY(30px);}30%{opacity:1;transform:translateY(0);}80%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-20px);}}
    .tt-wave{font-size:50px;margin-top:10px;animation:ttWave 3s ease forwards;opacity:0;}
    @keyframes ttWave{0%,20%{opacity:0;transform:rotate(0deg);}35%{opacity:1;transform:rotate(15deg);}45%{transform:rotate(-10deg);}55%{transform:rotate(15deg);}65%{transform:rotate(-5deg);}75%{opacity:1;transform:rotate(0deg);}100%{opacity:0;}}

    
    .logo-text{display:inline-flex;font-weight:900;font-size:22px;letter-spacing:2px;line-height:1;gap:0;}
    .logo-box{background:#0a0a0a;border:2px solid #1a1a1a;border-radius:10px;padding:8px 16px;display:inline-block;box-shadow:0 0 20px rgba(255,106,0,.15),inset 0 0 15px rgba(0,0,0,.6);position:relative;overflow:hidden;}
    .logo-box::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 40%,rgba(255,255,255,.04),transparent 60%);pointer-events:none;}
    .logo-text-lg{font-size:30px;letter-spacing:3px;}
    .disco-letter{
      display:inline-block;font-weight:900;
      -webkit-text-stroke:1.5px #000;
      text-shadow:2px 2px 0 #000,-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,0 0 8px currentColor;
      animation:discoDark 3s ease-in-out infinite;
      transition:text-shadow .3s;
    }
    .disco-letter:nth-child(1){animation-delay:0s;}
    .disco-letter:nth-child(2){animation-delay:.43s;}
    .disco-letter:nth-child(3){animation-delay:.86s;}
    .disco-letter:nth-child(4){animation-delay:1.29s;}
    .disco-letter:nth-child(5){animation-delay:1.71s;}
    .disco-letter:nth-child(6){animation-delay:2.14s;}
    .disco-letter:nth-child(7){animation-delay:2.57s;}
    @keyframes discoDark{
      0%,100%{color:#ffffff;text-shadow:2px 2px 0 #000,-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,0 0 12px rgba(255,255,255,.5);}
      25%{color:#111111;text-shadow:2px 2px 0 #000,-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,0 0 4px rgba(0,0,0,.3);}
      50%{color:#ff6a00;text-shadow:2px 2px 0 #000,-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,0 0 18px rgba(255,106,0,.7);}
      75%{color:#ffd700;text-shadow:2px 2px 0 #000,-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,0 0 16px rgba(255,215,0,.6);}
    }
    .logo-text-lg .disco-letter{-webkit-text-stroke:2px #000;}

    body.light .logo-box{background:#f0f0f2;border-color:#d0d0d5;box-shadow:0 0 20px rgba(0,113,227,.1),inset 0 0 10px rgba(0,0,0,.03);}
    body.light .disco-letter{
      -webkit-text-stroke:1px rgba(0,0,0,.3);
      animation-name:discoLight;
    }
    @keyframes discoLight{
      0%,100%{color:#111111;text-shadow:1px 1px 0 rgba(0,0,0,.15),0 0 8px rgba(0,0,0,.2);}
      20%{color:#0071e3;text-shadow:1px 1px 0 rgba(0,0,0,.15),0 0 14px rgba(0,113,227,.5);}
      40%{color:#ff2d78;text-shadow:1px 1px 0 rgba(0,0,0,.15),0 0 14px rgba(255,45,120,.5);}
      60%{color:#8b5cf6;text-shadow:1px 1px 0 rgba(0,0,0,.15),0 0 14px rgba(139,92,246,.5);}
      80%{color:#10b981;text-shadow:1px 1px 0 rgba(0,0,0,.15),0 0 14px rgba(16,185,129,.5);}
    }

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--accent);border-radius:var(--radius);padding:12px 22px;font-size:14px;font-weight:600;color:var(--text);z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,.5);transition:.4s;opacity:0;pointer-events:none;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .page-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;color:var(--sub);font-size:14px;gap:12px;}

    @media(max-width:768px){
      .sidebar:not(.collapsed){width:220px;min-width:220px;position:fixed;z-index:100;height:100dvh;box-shadow:6px 0 30px rgba(0,0,0,.5);}
      .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;}
      .sidebar-overlay.show{display:block;}
      .topbar h1{font-size:15px;}
      .card{padding:16px;}
      .avatar-big{width:90px;height:90px;}
      .profile-header{flex-direction:column;text-align:center;}
      .grid-2{grid-template-columns:1fr;}
      .guest-banner{flex-direction:column;text-align:center;}
    }
  </style>

    function startMatrix(){const c=document.getElementById('matrixCanvas'),ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;const chars='ALEXGPT0123456789@#$%&*+-',fs=16,cols=Math.floor(c.width/fs);let drops=Array(cols).fill(1);const iv=setInterval(()=>{ctx.fillStyle='rgba(0,0,0,0.08)';ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle='#ff6a00';ctx.font=fs+'px monospace';for(let i=0;i<drops.length;i++){ctx.fillText(chars[Math.floor(Math.random()*chars.length)],i*fs,drops[i]*fs);if(drops[i]*fs>c.height&&Math.random()>.975)drops[i]=0;drops[i]++;}},40);setTimeout(()=>clearInterval(iv),4500);}

    async function doLogin(){const email=document.getElementById('loginEmail').value.trim(),pass=document.getElementById('loginPass').value;if(!email||!pass)return showAuthError('Remplis tous les champs.');const{data,error}=await sb.auth.signInWithPassword({email,password:pass});if(error)return showAuthError(error.message);currentUser=data.user;isGuest=false;await loadProfile();enterApp();}
    async function doRegister(){const name=document.getElementById('regName').value.trim(),email=document.getElementById('regEmail').value.trim(),pass=document.getElementById('regPass').value;if(!name||!email||!pass)return showAuthError('Remplis tous les champs.');if(pass.length<6)return showAuthError('Mot de passe: minimum 6 caractères.');const{data:ad,error:ae}=await sb.auth.signUp({email,password:pass,options:{data:{username:name}}});if(ae)return showAuthError(ae.message);if(ad.user){await sb.from('users').upsert({id:ad.user.id,email,username:name});currentUser=ad.user;isGuest=false;await loadProfile();enterApp();toast('Compte créé! 🔥');}}

    function doGuest(){isGuest=true;currentUser={id:'guest-'+Date.now(),email:'invité@alexgpt.app'};currentProfile={username:'Invité',bio:'Mode découverte AlexGPT 👀',avatar_url:'',is_private:false,dark_theme:true,language:'fr',notifications_enabled:true,sounds_enabled:true,friend_requests_enabled:true,messages_privacy:'everyone',account_visibility:'public',is_online:true};demoLiked=new Set();demoGuestPosts=[];applyTheme();updateSidebarUser();enterApp();toast('Bienvenue en mode invité! 👀🔥');}

    async function doLogout(){if(!isGuest)await sb.auth.signOut();currentUser=null;currentProfile=null;isGuest=false;document.getElementById('appShell').style.display='none';document.getElementById('authScreen').style.display='flex';switchAuth('login');}
    async function loadProfile(){if(!currentUser||isGuest)return;const{data}=await sb.from('profiles').select('*').eq('id',currentUser.id).single();currentProfile=data||{username:currentUser.email?.split('@')[0],bio:'',avatar_url:'',is_private:false,dark_theme:true};applyTheme();updateSidebarUser();}
    function applyTheme(){if(currentProfile?.dark_theme===false)document.body.classList.add('light');else document.body.classList.remove('light');}
    function updateSidebarUser(){const name=currentProfile?.username||currentUser?.email?.split('@')[0]||'?';const email=isGuest?'Mode invité':(currentUser?.email||'');document.getElementById('sidebarName').textContent=name;document.getElementById('sidebarEmail').textContent=email;const av=document.getElementById('sidebarAvatar');if(currentProfile?.avatar_url)av.innerHTML='<img src="'+currentProfile.avatar_url+'" alt="">';else av.textContent=isGuest?'👀':name.charAt(0).toUpperCase();}

    function go(section,btn=null){currentSection=section;document.getElementById('pageTitle').textContent=section;document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');else document.querySelectorAll('.nav-btn').forEach(b=>{if(b.dataset.section===section)b.classList.add('active');});document.getElementById('inputBar').classList.add('hidden');if(innerWidth<=768){document.getElementById('sidebar').classList.add('collapsed');document.getElementById('sidebarOverlay').classList.remove('show');}const renders={Accueil:renderHome,Profil:renderProfile,Fil:renderFeed,Amis:renderFriends,Messages:renderMessages,Notifications:renderNotifications,Rechercher:renderSearch,'Paramètres':renderSettings};const fn=renders[section];if(fn)fn();else document.getElementById('content').innerHTML='<div class="card"><h2 style="color:var(--accent)">'+section+'</h2><p style="color:var(--sub);margin-top:8px;">Section en développement.</p></div>';}
    function loading(){return '<div class="page-loading"><div class="spinner"></div>Chargement...</div>';}

    async function renderHome(){const name=currentProfile?.username||'?';let pc=0,fc=0,phc=0,nc=0;if(isGuest){pc=DEMO_POSTS.filter(p=>p.user_id==='guest').length+demoGuestPosts.length;fc=DEMO_FRIENDS.length;nc=DEMO_NOTIFS.filter(n=>!n.is_read).length;}else{({count:pc}=await sb.from('posts').select('*',{count:'exact',head:true}).eq('user_id',currentUser.id));({count:fc}=await sb.from('friendships').select('*',{count:'exact',head:true}).or('requester_id.eq.'+currentUser.id+',addressee_id.eq.'+currentUser.id).eq('status','accepted'));({count:phc}=await sb.from('photos').select('*',{count:'exact',head:true}).eq('user_id',currentUser.id));({count:nc}=await sb.from('notifications').select('*',{count:'exact',head:true}).eq('user_id',currentUser.id).eq('is_read',false));}
    document.getElementById('content').innerHTML=guestBanner()+'<div class="card"><div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;"><div class="avatar-big">'+(isGuest?'👀':(currentProfile?.avatar_url?'<img src="'+currentProfile.avatar_url+'">':name.charAt(0).toUpperCase()))+'</div><div><h2 style="color:var(--accent);font-size:22px;font-weight:800;">Bienvenue '+esc(name)+' 🔥</h2><p style="color:var(--sub);margin-top:4px;">'+(isGuest?'Explore AlexGPT Social librement!':'Ton réseau social AlexGPT est prêt!')+'</p></div></div><div class="grid-2"><div class="stat-box"><h3>'+(pc||0)+'</h3><p>Publications</p></div><div class="stat-box"><h3>'+(fc||0)+'</h3><p>Amis</p></div><div class="stat-box"><h3>'+(phc||0)+'</h3><p>Photos</p></div><div class="stat-box"><h3>'+(nc||0)+'</h3><p>Notifications</p></div></div></div><div class="card"><h3 style="color:var(--accent);margin-bottom:12px;">Publication rapide</h3><div class="field"><textarea id="quickPost" rows="3" placeholder="Qu\'est-ce qui se passe?"></textarea></div><button class="btn btn-primary" onclick="quickPost()">Publier 🔥</button></div>';}

    async function quickPost(){const content=document.getElementById('quickPost')?.value.trim();if(!content)return toast('Écris quelque chose!');if(isGuest){demoGuestPosts.unshift({id:'gp-'+Date.now(),user_id:'guest',content,likes_count:0,comments_count:0,created_at:new Date().toISOString(),profiles:{username:'Invité',avatar_url:''}});toast('Publication ajoutée! 🔥 (démo)');document.getElementById('quickPost').value='';renderHome();return;}const{error}=await sb.from('posts').insert({user_id:currentUser.id,content});if(error)return toast('Erreur: '+error.message);toast('Publication ajoutée! 🔥');document.getElementById('quickPost').value='';renderHome();}

    async function renderFeed(){const el=document.getElementById('content');if(isGuest){el.innerHTML=guestBanner()+renderPostCards([...demoGuestPosts,...DEMO_POSTS]);return;}el.innerHTML=loading();const{data:posts,error}=await sb.from('posts').select('*, profiles:user_id(username, avatar_url)').order('created_at',{ascending:false}).limit(30);if(error||!posts?.length){el.innerHTML='<div class="card"><p style="color:var(--sub)">Aucune publication.</p></div>';return;}const postIds=posts.map(p=>p.id);const{data:myLikes}=await sb.from('post_likes').select('post_id').eq('user_id',currentUser.id).in('post_id',postIds);el.innerHTML=renderPostCards(posts,new Set((myLikes||[]).map(l=>l.post_id)));}

    function renderPostCards(posts,likedSet){if(!likedSet)likedSet=demoLiked;let html='';for(const p of posts){const pr=p.profiles||{},name=pr.username||'Anonyme',time=timeAgo(p.created_at),liked=likedSet.has(p.id),isMine=isGuest?p.user_id==='guest':p.user_id===currentUser?.id;html+='<div class="card"><div class="card-header"><div class="card-avatar">'+name.charAt(0).toUpperCase()+'</div><div><div class="card-name">'+esc(name)+'</div><div class="card-time">'+time+'</div></div></div><div class="card-body">'+esc(p.content)+'</div><div class="card-actions"><button class="btn btn-sm '+(liked?'btn-primary':'btn-secondary')+'" onclick="toggleLike(\''+p.id+'\','+liked+')">'+(liked?'❤️':'🤍')+' '+(p.likes_count||0)+'</button><button class="btn btn-sm btn-secondary" onclick="showComments(\''+p.id+'\')">💬 '+(p.comments_count||0)+'</button>'+(isMine?'<button class="btn btn-sm btn-danger" onclick="deletePost(\''+p.id+'\')">🗑️</button>':'')+'</div><div id="comments-'+p.id+'" class="hidden" style="margin-top:12px;"></div></div>';}if(!html)html='<div class="card"><p style="color:var(--sub)">Aucune publication. Sois le premier!</p></div>';return html;}

    async function toggleLike(postId,isLiked){if(isGuest){if(isLiked){demoLiked.delete(postId);const p=[...demoGuestPosts,...DEMO_POSTS].find(x=>x.id===postId);if(p)p.likes_count=Math.max(0,(p.likes_count||1)-1);}else{demoLiked.add(postId);const p=[...demoGuestPosts,...DEMO_POSTS].find(x=>x.id===postId);if(p)p.likes_count=(p.likes_count||0)+1;}renderFeed();return;}if(isLiked){await sb.from('post_likes').delete().eq('post_id',postId).eq('user_id',currentUser.id);const{data:post}=await sb.from('posts').select('likes_count').eq('id',postId).single();if(post)await sb.from('posts').update({likes_count:Math.max(0,(post.likes_count||1)-1)}).eq('id',postId);}else{await sb.from('post_likes').insert({post_id:postId,user_id:currentUser.id});const{data:post}=await sb.from('posts').select('likes_count').eq('id',postId).single();if(post)await sb.from('posts').update({likes_count:(post.likes_count||0)+1}).eq('id',postId);}renderFeed();}

    async function deletePost(postId){if(!confirm('Supprimer?'))return;if(isGuest){demoGuestPosts=demoGuestPosts.filter(p=>p.id!==postId);toast('Supprimé (démo)');renderFeed();return;}await sb.from('posts').delete().eq('id',postId);toast('Supprimé.');renderFeed();}

    async function showComments(postId){const el=document.getElementById('comments-'+postId);if(!el)return;if(!el.classList.contains('hidden')){el.classList.add('hidden');return;}el.classList.remove('hidden');if(isGuest){el.innerHTML='<div style="padding:8px;background:var(--card2);border-radius:10px;margin-bottom:6px;font-size:13px;"><strong style="color:var(--accent)">Sophie</strong><span style="color:var(--sub);margin-left:8px;font-size:11px;">2 h</span><p style="margin-top:4px;">Trop sick! 🔥</p></div><div style="display:flex;gap:6px;margin-top:6px;"><input type="text" id="cmt-'+postId+'" placeholder="Ton commentaire..." style="flex:1;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:13px;outline:none;"><button class="btn btn-primary btn-sm" onclick="addComment(\''+postId+'\')">Envoyer</button></div>';return;}const{data:comments}=await sb.from('post_comments').select('*, profiles:user_id(username)').eq('post_id',postId).order('created_at',{ascending:true});let html='';if(comments?.length)comments.forEach(c=>{html+='<div style="padding:8px;background:var(--card2);border-radius:10px;margin-bottom:6px;font-size:13px;"><strong style="color:var(--accent)">'+esc(c.profiles?.username||'Anonyme')+'</strong><span style="color:var(--sub);margin-left:8px;font-size:11px;">'+timeAgo(c.created_at)+'</span><p style="margin-top:4px;">'+esc(c.content)+'</p></div>';});html+='<div style="display:flex;gap:6px;margin-top:6px;"><input type="text" id="cmt-'+postId+'" placeholder="Ton commentaire..." style="flex:1;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:13px;outline:none;"><button class="btn btn-primary btn-sm" onclick="addComment(\''+postId+'\')">Envoyer</button></div>';el.innerHTML=html;}

    async function addComment(postId){const input=document.getElementById('cmt-'+postId),content=input?.value.trim();if(!content)return;if(isGuest){toast('Commentaire ajouté! (démo)');input.value='';return;}await sb.from('post_comments').insert({post_id:postId,user_id:currentUser.id,content});const{data:post}=await sb.from('posts').select('comments_count').eq('id',postId).single();if(post)await sb.from('posts').update({comments_count:(post.comments_count||0)+1}).eq('id',postId);showComments(postId);}

    async function renderProfile(){if(!isGuest)await loadProfile();const el=document.getElementById('content'),p=currentProfile||{},name=p.username||'?';if(isGuest){const myPC=DEMO_POSTS.filter(x=>x.user_id==='guest').length+demoGuestPosts.length;el.innerHTML=guestBanner()+'<div class="card"><div class="profile-header"><div class="avatar-big">👀</div><div><h2 style="color:var(--accent);font-size:22px;font-weight:800;">Invité</h2><p style="color:var(--sub);margin-top:4px;">Mode découverte AlexGPT 👀</p><p style="font-size:12px;margin-top:4px;">Visibilité: <strong style="color:var(--accent)">public</strong></p></div></div><div class="grid-2"><div class="stat-box"><h3>'+myPC+'</h3><p>Publications</p></div><div class="stat-box"><h3>'+DEMO_FRIENDS.length+'</h3><p>Amis</p></div></div></div><div class="card"><h3 style="color:var(--accent);margin-bottom:12px;">Modifier le profil</h3><p style="color:var(--sub);font-size:14px;">Crée un compte pour personnaliser ton profil!</p><button class="btn btn-primary" style="margin-top:14px;" onclick="goToSignup()">Créer un compte</button></div>';return;}const{count:postCount}=await sb.from('posts').select('*',{count:'exact',head:true}).eq('user_id',currentUser.id);const{data:myPosts}=await sb.from('posts').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false}).limit(5);el.innerHTML='<div class="card">'+(p.is_private?'<div class="privacy-shield"><div class="privacy-lock">🔒</div><div class="privacy-logo"><img src="'+MARCEAU_LOGO+'" alt="Marceau"></div><div class="privacy-title">T\'es en sécurité</div><div class="privacy-msg">Le monde m\'appelle <strong style=\"color:var(--accent)\">Marceau</strong>. Ton profil est protégé — personne peut voir tes infos.</div><div class="privacy-badge">🛡️ Mode vie privée activé</div><div class="privacy-stats"><div class="privacy-stat"><h4>🔒</h4><p>Profil caché</p></div><div class="privacy-stat"><h4>👁️‍🗨️</h4><p>Photos masquées</p></div><div class="privacy-stat"><h4>🛡️</h4><p>Données sécurisées</p></div></div></div>':'')+'<div class="profile-header"><div class="avatar-big">'+(p.avatar_url?'<img src="'+p.avatar_url+'">':name.charAt(0).toUpperCase())+'</div><div><h2 style="color:var(--accent);font-size:22px;font-weight:800;">'+esc(name)+'</h2><p style="color:var(--sub);margin-top:4px;">'+esc(p.bio||'Aucune bio.')+'</p><p style="color:var(--sub);font-size:12px;margin-top:4px;">'+currentUser.email+'</p></div></div><div class="grid-2"><div class="stat-box"><h3>'+(postCount||0)+'</h3><p>Publications</p></div><div class="stat-box"><h3>0</h3><p>Photos</p></div></div></div><div class="card"><h3 style="color:var(--accent);margin-bottom:12px;">Modifier le profil</h3><div class="field"><label>Nom</label><input type="text" id="editName" value="'+esc(p.username||'')+'"></div><div class="field"><label>Bio</label><textarea id="editBio" rows="3">'+esc(p.bio||'')+'</textarea></div><button class="btn btn-primary" onclick="saveProfile()">Enregistrer</button></div><div class="card"><h3 style="color:var(--accent);margin-bottom:12px;">Mes publications</h3>'+(myPosts?.length?myPosts.map(post=>'<div style="padding:12px;background:var(--card2);border-radius:12px;margin-bottom:8px;border:1px solid var(--border);"><p style="font-size:14px;">'+esc(post.content)+'</p><p style="font-size:11px;color:var(--sub);margin-top:6px;">'+timeAgo(post.created_at)+' · ❤️ '+(post.likes_count||0)+' · 💬 '+(post.comments_count||0)+'</p></div>').join(''):'<p style="color:var(--sub);">Aucune publication.</p>')+'</div>';}

    async function saveProfile(){if(isGuest)return toast('Crée un compte pour sauvegarder!');const username=document.getElementById('editName').value.trim(),bio=document.getElementById('editBio').value.trim();const{error}=await sb.from('profiles').update({username,bio,updated_at:new Date().toISOString()}).eq('id',currentUser.id);if(error)return toast('Erreur: '+error.message);toast('Profil mis à jour! ✅');await loadProfile();renderProfile();}

    async function renderFriends(){const el=document.getElementById('content');if(isGuest){let html=guestBanner()+'<div class="card"><h2 style="color:var(--accent);margin-bottom:14px;">Mes amis</h2><h3 style="color:var(--accent);font-size:14px;margin-bottom:10px;">Demandes en attente (1)</h3><div class="user-card"><div><h3>Félix</h3><p>Veut être ton ami</p></div><div style="display:flex;gap:6px;"><button class="btn btn-success btn-sm" onclick="toast(\'Ami ajouté! 🤝 (démo)\')">✅ Accepter</button><button class="btn btn-danger btn-sm" onclick="toast(\'Refusé (démo)\')">❌ Refuser</button></div></div><div style="height:14px;"></div>';DEMO_FRIENDS.forEach(f=>{html+='<div class="user-card"><div><h3>'+esc(f.username)+'</h3><p>'+esc(f.bio)+'</p></div><span style="color:var(--success);font-weight:700;font-size:13px;">Ami ✅</span></div>';});html+='</div>';el.innerHTML=html;return;}el.innerHTML=loading();const{data:friends}=await sb.from('friendships').select('*, requester:requester_id(id, username, email), addressee:addressee_id(id, username, email)').or('requester_id.eq.'+currentUser.id+',addressee_id.eq.'+currentUser.id).eq('status','accepted');const{data:pending}=await sb.from('friendships').select('*, requester:requester_id(id, username, email)').eq('addressee_id',currentUser.id).eq('status','pending');let html='<div class="card"><h2 style="color:var(--accent);margin-bottom:14px;">Mes amis</h2>';if(pending?.length){html+='<h3 style="color:var(--accent);font-size:14px;margin-bottom:10px;">Demandes en attente ('+pending.length+')</h3>';pending.forEach(req=>{const name=req.requester?.username||req.requester?.email||'?';html+='<div class="user-card"><div><h3>'+esc(name)+'</h3><p>Veut être ton ami</p></div><div style="display:flex;gap:6px;"><button class="btn btn-success btn-sm" onclick="respondFriend(\''+req.id+'\',\'accepted\')">✅ Accepter</button><button class="btn btn-danger btn-sm" onclick="respondFriend(\''+req.id+'\',\'blocked\')">❌ Refuser</button></div></div>';});html+='<div style="height:14px;"></div>';}if(friends?.length){friends.forEach(f=>{const friend=f.requester_id===currentUser.id?f.addressee:f.requester;const name=friend?.username||friend?.email||'?';html+='<div class="user-card"><div><h3>'+esc(name)+'</h3><p>Ami ✅</p></div></div>';});}else if(!pending?.length){html+='<p style="color:var(--sub);">Aucun ami. Recherche des profils!</p>';}html+='</div>';el.innerHTML=html;}
    async function respondFriend(fid,status){await sb.from('friendships').update({status,updated_at:new Date().toISOString()}).eq('id',fid);toast(status==='accepted'?'Ami ajouté! 🤝':'Refusé.');renderFriends();}

    function renderMessages(){document.getElementById('inputBar').classList.remove('hidden');document.getElementById('content').innerHTML=guestBanner()+'<div class="chat-wrap" id="chatWrap"><div class="msg bot">Bienvenue dans tes messages! 👋</div>'+(isGuest?'<div class="msg bot">T\'es en mode invité — explore librement! 👀</div>':'')+'<div class="msg bot">Écris et envoie des emojis ici ✨</div></div><div class="emoji-bar">'+['😀','🔥','❤️','😎','👀','🚀','😂','🥶','😈','👍','💪','🎮'].map(e=>'<button class="emoji-btn" onclick="sendEmoji(\''+e+'\')">'+e+'</button>').join('')+'</div>';}
    function sendMsg(){const input=document.getElementById('msgInput'),wrap=document.getElementById('chatWrap');if(!input?.value.trim()||!wrap)return;appendMsg(wrap,'user',input.value);const replies=['Bon message! 🔥','J\'aime ça! 💪','Trop sick! 😎','Haha nice! 😂','Continue! 🚀','Intéressant! 👀'];appendMsg(wrap,'bot',replies[Math.floor(Math.random()*replies.length)]);input.value='';}

    async function renderNotifications(){const el=document.getElementById('content');if(isGuest){let html=guestBanner()+'<div class="card"><h2 style="color:var(--accent);margin-bottom:14px;">Notifications</h2>';DEMO_NOTIFS.forEach(n=>{html+='<div class="notif-item"><div class="notif-dot '+(n.is_read?'read':'')+'"></div><div><p style="font-size:14px;">'+esc(n.message)+'</p><p style="font-size:11px;color:var(--sub);margin-top:3px;">'+timeAgo(n.created_at)+'</p></div></div>';});html+='<button class="btn btn-secondary" style="margin-top:14px;" onclick="markAllRead()">Tout marquer comme lu</button></div>';el.innerHTML=html;return;}el.innerHTML=loading();const{data:notifs}=await sb.from('notifications').select('*').eq('user_id',currentUser.id).order('created_at',{ascending:false}).limit(30);let html='<div class="card"><h2 style="color:var(--accent);margin-bottom:14px;">Notifications</h2>';if(notifs?.length){notifs.forEach(n=>{html+='<div class="notif-item"><div class="notif-dot '+(n.is_read?'read':'')+'"></div><div><p style="font-size:14px;">'+esc(n.message)+'</p><p style="font-size:11px;color:var(--sub);margin-top:3px;">'+timeAgo(n.created_at)+'</p></div></div>';});html+='<button class="btn btn-secondary" style="margin-top:14px;" onclick="markAllRead()">Tout marquer comme lu</button>';}else html+='<p style="color:var(--sub);">Aucune notification.</p>';html+='</div>';el.innerHTML=html;}
    async function markAllRead(){if(isGuest){DEMO_NOTIFS.forEach(n=>n.is_read=true);toast('Notifications lues! ✅');renderNotifications();return;}await sb.from('notifications').update({is_read:true}).eq('user_id',currentUser.id).eq('is_read',false);toast('Notifications lues! ✅');renderNotifications();}

    async function renderSearch(){document.getElementById('content').innerHTML=guestBanner()+'<div class="card"><h2 style="color:var(--accent);margin-bottom:14px;">Rechercher</h2><div class="field"><input type="text" id="searchInput" placeholder="Chercher un profil..." oninput="doSearch()"></div><div id="searchResults"></div></div>';doSearch();}
    async function doSearch(){const q=document.getElementById('searchInput')?.value.trim().toLowerCase()||'',results=document.getElementById('searchResults');if(!results)return;if(isGuest){const filtered=DEMO_USERS.filter(u=>u.username.toLowerCase().includes(q));if(!filtered.length){results.innerHTML='<p style="color:var(--sub);margin-top:12px;">Aucun profil trouvé.</p>';return;}results.innerHTML=filtered.map(u=>'<div class="user-card"><div><h3>'+esc(u.username)+'</h3><p>'+esc(u.bio)+'</p></div><button class="btn btn-primary btn-sm" onclick="toast(\'Demande envoyée! 🤝 (démo)\')">➕ Ajouter</button></div>').join('');return;}let query=sb.from('profiles').select('id, username, bio, avatar_url, is_private, account_visibility').neq('id',currentUser.id);if(q)query=query.ilike('username','%'+q+'%');const{data:profiles}=await query.limit(15);if(!profiles?.length){results.innerHTML='<p style="color:var(--sub);margin-top:12px;">Aucun profil trouvé.</p>';return;}results.innerHTML=profiles.filter(p=>p.account_visibility!=='private').map(p=>'<div class="user-card"><div><h3>'+esc(p.username||'Anonyme')+'</h3><p>'+esc(p.bio||'Pas de bio')+'</p></div><button class="btn btn-primary btn-sm" onclick="addFriend(\''+p.id+'\')">➕ Ajouter</button></div>').join('');}
    async function addFriend(userId){if(isGuest)return toast('Crée un compte pour ajouter des amis!');const{data:existing}=await sb.from('friendships').select('id').or('and(requester_id.eq.'+currentUser.id+',addressee_id.eq.'+userId+'),and(requester_id.eq.'+userId+',addressee_id.eq.'+currentUser.id+')');if(existing?.length)return toast('Demande déjà envoyée.');const{error}=await sb.from('friendships').insert({requester_id:currentUser.id,addressee_id:userId});if(error)return toast('Erreur: '+error.message);await sb.from('notifications').insert({user_id:userId,type:'friend_request',message:(currentProfile?.username||'Quelqu\'un')+' veut être ton ami!',related_user_id:currentUser.id});toast('Demande envoyée! 🤝');}

    async function renderSettings(){if(!isGuest)await loadProfile();const p=currentProfile||{};document.getElementById('content').innerHTML=guestBanner()+'<div class="card"><h2 style="color:var(--accent);margin-bottom:14px;">⚙️ Paramètres</h2>'+(isGuest?'<p style="color:var(--sub);margin-bottom:14px;">Paramètres en mode démo. Crée un compte pour sauvegarder!</p>':'')+'<div class="grid-2"><div><div class="field"><label>Nom</label><input type="text" id="sName" value="'+esc(p.username||'')+'" '+(isGuest?'disabled':'')+'></div><div class="field"><label>Bio</label><textarea id="sBio" rows="3" '+(isGuest?'disabled':'')+'>'+esc(p.bio||'')+'</textarea></div><div class="field"><label>Langue</label><select id="sLang" '+(isGuest?'disabled':'')+'><option value="fr" '+(p.language==='fr'?'selected':'')+'>Français</option><option value="en" '+(p.language==='en'?'selected':'')+'>English</option><option value="es" '+(p.language==='es'?'selected':'')+'>Español</option></select></div></div><div><div class="field"><label>Visibilité</label><select id="sVis" '+(isGuest?'disabled':'')+'><option value="public" '+(p.account_visibility==='public'?'selected':'')+'>Public</option><option value="private" '+(p.account_visibility==='private'?'selected':'')+'>Privé</option><option value="friends" '+(p.account_visibility==='friends'?'selected':'')+'>Amis seulement</option></select></div><div class="field"><label>Messages</label><select id="sMsgPriv" '+(isGuest?'disabled':'')+'><option value="everyone" '+(p.messages_privacy==='everyone'?'selected':'')+'>Tout le monde</option><option value="friends" '+(p.messages_privacy==='friends'?'selected':'')+'>Amis seulement</option><option value="nobody" '+(p.messages_privacy==='nobody'?'selected':'')+'>Personne</option></select></div><button class="btn btn-primary" onclick="saveSettings()">'+(isGuest?'Créer un compte':'Enregistrer')+'</button></div></div><div class="setting-row"><div><div class="setting-label">Mode clair / sombre</div><div class="setting-desc">Change le thème.</div></div><label class="switch"><input type="checkbox" '+(p.dark_theme!==false?'checked':'')+' onchange="toggleDark()"><span class="slider"></span></label></div><div class="setting-row"><div><div class="setting-label">Mode vie privée</div><div class="setting-desc">Cache le profil.</div></div><label class="switch"><input type="checkbox" '+(p.is_private?'checked':'')+' onchange="toggleBool(\'is_private\')"><span class="slider"></span></label></div><div class="setting-row"><div><div class="setting-label">Notifications</div><div class="setting-desc">Recevoir les alertes.</div></div><label class="switch"><input type="checkbox" '+(p.notifications_enabled!==false?'checked':'')+' onchange="toggleBool(\'notifications_enabled\')"><span class="slider"></span></label></div><div class="setting-row"><div><div class="setting-label">Sons</div><div class="setting-desc">Activer les sons.</div></div><label class="switch"><input type="checkbox" '+(p.sounds_enabled!==false?'checked':'')+' onchange="toggleBool(\'sounds_enabled\')"><span class="slider"></span></label></div><div class="setting-row"><div><div class="setting-label">Statut en ligne</div><div class="setting-desc">Montrer que t\'es connecté.</div></div><label class="switch"><input type="checkbox" '+(p.is_online?'checked':'')+' onchange="toggleBool(\'is_online\')"><span class="slider"></span></label></div><div class="setting-row"><div><div class="setting-label">Demandes d\'amis</div><div class="setting-desc">Autoriser les demandes.</div></div><label class="switch"><input type="checkbox" '+(p.friend_requests_enabled!==false?'checked':'')+' onchange="toggleBool(\'friend_requests_enabled\')"><span class="slider"></span></label></div></div>';}

    async function saveSettings(){if(isGuest)return goToSignup();const updates={username:document.getElementById('sName').value.trim(),bio:document.getElementById('sBio').value.trim(),language:document.getElementById('sLang').value,account_visibility:document.getElementById('sVis').value,messages_privacy:document.getElementById('sMsgPriv').value,updated_at:new Date().toISOString()};const{error}=await sb.from('profiles').update(updates).eq('id',currentUser.id);if(error)return toast('Erreur: '+error.message);toast('Sauvegardé! ✅');await loadProfile();}
    async function toggleDark(){
      // Show Alex transition
      const overlay=document.getElementById('themeTransition');
      const av=document.getElementById('ttAvatar');
      av.innerHTML='<img src="'+ALEX_AVATAR+'" alt="Alex">';
      overlay.classList.add('active');
      // Switch theme after 1.2s (mid-animation)
      setTimeout(()=>{
        if(isGuest){currentProfile.dark_theme=!currentProfile.dark_theme;applyTheme();}
        else{const val=!(currentProfile?.dark_theme===false);sb.from('profiles').update({dark_theme:!val,updated_at:new Date().toISOString()}).eq('id',currentUser.id).then(()=>loadProfile());}
      },1200);
      // Remove overlay after 3s
      setTimeout(()=>{overlay.classList.remove('active');},3100);
    }
    async function toggleBool(key){if(isGuest){currentProfile[key]=!currentProfile[key];toast('Mis à jour (démo)');return;}const val=!currentProfile?.[key];await sb.from('profiles').update({[key]:val,updated_at:new Date().toISOString()}).eq('id',currentUser.id);await loadProfile();}


    function startFireEffect(){
      const c=document.getElementById('fireCanvas'),ctx=c.getContext('2d');
      c.width=innerWidth;c.height=innerHeight;
      const particles=[];
      class FireParticle{
        constructor(){this.reset();}
        reset(){
          this.x=Math.random()*c.width;
          this.y=c.height+10;
          this.vx=(Math.random()-.5)*2;
          this.vy=-(Math.random()*4+2);
          this.size=Math.random()*6+2;
          this.life=Math.random()*60+40;
          this.maxLife=this.life;
          const colors=['255,60,0','255,100,0','255,140,20','255,180,40','255,220,80'];
          this.color=colors[Math.floor(Math.random()*colors.length)];
        }
        update(){
          this.x+=this.vx+Math.sin(this.life*.1)*.5;
          this.y+=this.vy;
          this.life--;
          if(this.life<=0)this.reset();
        }
        draw(){
          const alpha=this.life/this.maxLife;
          ctx.beginPath();
          ctx.arc(this.x,this.y,this.size*alpha,0,Math.PI*2);
          ctx.fillStyle='rgba('+this.color+','+alpha+')';
          ctx.fill();
          ctx.beginPath();
          ctx.arc(this.x,this.y,this.size*alpha*2,0,Math.PI*2);
          ctx.fillStyle='rgba('+this.color+','+(alpha*.15)+')';
          ctx.fill();
        }
      }
      for(let i=0;i<120;i++)particles.push(new FireParticle());
      const iv=setInterval(()=>{
        ctx.clearRect(0,0,c.width,c.height);
        particles.forEach(p=>{p.update();p.draw();});
      },30);
      setTimeout(()=>clearInterval(iv),5000);
    }

    function spawnEmbers(){
      const container=document.getElementById('emberContainer');
      if(!container)return;
      function createEmber(){
        const ember=document.createElement('div');
        ember.className='ember';
        const size=Math.random()*6+2;
        const x=Math.random()*100;
        const duration=Math.random()*3+2;
        const delay=Math.random()*4;
        const colors=['#ff4500','#ff6a00','#ff8c00','#ffa500','#ffd700'];
        ember.style.cssText='width:'+size+'px;height:'+size+'px;left:'+x+'%;bottom:-10px;background:'+colors[Math.floor(Math.random()*colors.length)]+';box-shadow:0 0 '+(size*2)+'px '+colors[Math.floor(Math.random()*colors.length)]+';animation-duration:'+duration+'s;animation-delay:'+delay+'s;';
        container.appendChild(ember);
        setTimeout(()=>ember.remove(),(duration+delay)*1000);
      }
      for(let i=0;i<40;i++)createEmber();
      const iv=setInterval(()=>{for(let i=0;i<5;i++)createEmber();},400);
      setTimeout(()=>clearInterval(iv),5000);
    }
    function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
    function timeAgo(date){if(!date)return '';const diff=(Date.now()-new Date(date).getTime())/1000;if(diff<60)return "à l'instant";if(diff<3600)return Math.floor(diff/60)+' min';if(diff<86400)return Math.floor(diff/3600)+' h';return Math.floor(diff/86400)+' j';}
    async function checkSession(){const{data:{session}}=await sb.auth.getSession();if(session?.user){currentUser=session.user;isGuest=false;await loadProfile();enterApp();}}
    window.addEventListener('load',()=>{startMatrix();startFireEffect();spawnEmbers();setTimeout(()=>{document.getElementById('splash').style.display='none';document.getElementById('app').classList.remove('hidden');checkSession();},4500);});
  </script>
